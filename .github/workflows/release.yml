name: release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.6'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "v${PACKAGE_VERSION}" != "${RELEASE_TAG}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package version v${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Validate package
        run: bun run lint && bun run type-check && bun run test

      - name: Verify npm token is configured
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "Missing NPM_TOKEN secret. Configure repository secret NPM_TOKEN before publishing."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (public repo provenance)
        if: ${{ github.event.repository.private == false }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (private repo fallback)
        if: ${{ github.event.repository.private == true }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
